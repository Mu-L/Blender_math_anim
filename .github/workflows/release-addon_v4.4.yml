name: Release Addon

on:
  push:
    tags:
      - "b4.4*"

jobs:
  build-addon:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build addon zips
        run: |
          set -e
          mkdir -p build
          VERSION="${{ github.ref_name }}"

          for dir in extensions/platform_dependency/*; do
            os=$(basename "$dir")
            echo "Building for $os version..."

            tmp_addon="addon_math_anim"
            rm -rf "$tmp_addon"
            cp -r extensions/b4.4 "$tmp_addon"

            cp "$dir/b4.4/"*.toml "$tmp_addon/"
            cp "$dir/b4.4/wheels/"* "$tmp_addon/wheels/"

            zip -r "build/math_anim_${os}_${VERSION}.zip" "$tmp_addon" \
              -x "$tmp_addon/.DS_Store" \
              -x "$tmp_addon/__pycache__/*"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.zip
